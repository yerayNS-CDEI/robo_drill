controller_manager:
  ros__parameters:
    update_rate: 250  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diffbot_base_controller:
      type: diff_drive_controller/DiffDriveController

    turret_controller:
      type: velocity_controllers/JointGroupVelocityController

    gantry_position_controller:
      type: forward_command_controller/ForwardCommandController

    sim_controller:
      type: sim_controller/SimController
      
diffbot_base_controller:
  ros__parameters:
    left_wheel_names: ["drivewhl_l_joint"]
    right_wheel_names: ["drivewhl_r_joint"]

    wheel_separation: 0.3655 #0.632146
    # wheels_per_side: 1  # actually 2, but both are controlled by 1 signal
    wheel_radius: 0.125

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [ 0.001, 0.001, 0.001, 0.001, 0.001, 0.01 ]
    twist_covariance_diagonal: [ 0.001, 0.001, 0.001, 0.001, 0.001, 0.01 ]

    open_loop: false  # If true: computes odometry from command velocities
    position_feedback: false # set to true if you are correctly computing position values in the read function
    enable_odom_tf: false

    cmd_vel_timeout: 0.5
    #publish_limited_velocity: true
    use_stamped_vel: false
    #velocity_rolling_window_size: 10

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false # rate of change of acceleration. Units: m/s3. A high value indicates that motion can be jolty or abrupt.
    linear.x.max_velocity: 0.5
    linear.x.min_velocity: -0.5
    linear.x.max_acceleration: 0.8
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 0.3
    angular.z.min_velocity: -0.3
    angular.z.max_acceleration: 0.5
    angular.z.min_acceleration: -0.5
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0

joint_state_broadcaster:
  ros__parameters:
    joints: [ 'drivewhl_l_joint', 'drivewhl_r_joint', 'turret_joint',
              'gantry_z_joint', 'gantry_y_joint', 'gantry_x_joint', 'gantry_rot_joint' ]

turret_controller:
  ros__parameters:
    joints: [ 'turret_joint' ]

gantry_position_controller:
  ros__parameters:
    joints:
      - gantry_z_joint
      - gantry_y_joint
      - gantry_x_joint
      - gantry_rot_joint
    interface_name: position

sim_controller:
  ros__parameters:
    interface_name: 'velocity'
    joints: ['drivewhl_l_joint', 'drivewhl_r_joint','turret_joint']
    cmd_topic_name: '/diffbot_base_controller/cmd_vel_unstamped'
    odometry_topic_name: '/odom'
    update_mode: 'readings'
    cmd_type: 'relative'
    enable_pull_compensation: true
    pull_compensation_min_speed: 0.05
    cmd_vel_timeout: 0.5
    enable_park_service: true  # exposes ~/park_now for live parking tests in sim
    # Linear velocity limits [m/s]
    max_x_velocity: 0.2
    min_x_velocity: -0.2
    max_y_velocity: 0.2
    min_y_velocity: -0.2
    max_z_velocity: 0.0
    min_z_velocity: 0.0
    # Angular velocity limits [rad/s]
    max_angular_turret: 0.35 # thetap_dot
    min_angular_turret: -0.35
    max_angular_base: 0.2 # thetac_dot
    min_angular_base: -0.2
    # Acceleration limits (0 = unconstrained)
    max_x_acceleration: 0.2
    min_x_acceleration: -0.2
    max_y_acceleration: 0.2
    min_y_acceleration: -0.2
    max_z_acceleration: 0.2
    min_z_acceleration: -0.2
    max_alpha_base: 0.2
    min_alpha_base: -0.2
    max_alpha_turret: 0.2
    min_alpha_turret: -0.2
    # Wheel speed limits [rad/s]
    max_left_wheel_motor_speed: 3.5   # 	ωL
    min_left_wheel_motor_speed: -3.5 
    max_right_wheel_motor_speed: 3.5  # 	ωR
    min_right_wheel_motor_speed: -3.5
    max_turret_motor_speed: 0.5       # 	ωT = (dφ/dt)
    min_turret_motor_speed: -0.5
    should_publish_tf: false
    should_publish_odom: false
