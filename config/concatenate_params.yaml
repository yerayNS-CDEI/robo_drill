pointcloud_merge:
  ros__parameters:
    target_frame: front_sick_scan
    clouds: 2
    # Output publish rate. Decoupled from input rates: each tick merges the
    # latest buffered cloud from every source, so this need not be a
    # lowest-common-denominator of the sensor rates. The sicks run at 20 Hz and
    # contribute their newest sample each tick.
    hz: 10.0
    # 0.0 = never block waiting for a transform. Both sicks are rigidly
    # mounted on turret_link, so rear_sick->front_sick_scan is a STATIC transform (on
    # /tf_static, valid at any timestamp). Once /tf_static is received it is
    # cached forever, so a non-zero timeout only ever stalls during the first
    # ~1-2 s before /tf_static arrives (the ~205 ms startup ticks we saw). With
    # 0.0 we fail fast to the latest-TF fallback instead of waiting; because the
    # transform is static there is no accuracy cost (latest == exact).
    transform_timeout_sec: 0.0
    fallback_to_latest_transform: true
    # Drop a source from the merge if its newest cloud is older than this many
    # seconds (a hung/dead sensor). Trade-off: a genuinely dead sensor keeps
    # getting re-published (stale) for up to this long.
    max_cloud_age: 0.75

    cloud_in1_topic: /front/points
    cloud_in2_topic: /rear/points
    cloud_out_topic: /combined_cloud
