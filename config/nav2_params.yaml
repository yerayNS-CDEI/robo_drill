controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0

    #The controller server filters the velocity portion of the odometry messages received before sending them to the controller plugin.
    #Odometry values below this threshold (in m/s) will be set to 0.0.
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    # The maximum duration in seconds the called controller plugin can fail (i.e. the computeVelocityCommands function of the plugin throwing an exception)
    #before the nav2_msgs::action::FollowPath action fails. Setting it to the special value of -1.0 makes it infinite, 0 to disable, and any positive value for the appropriate timeout.
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    current_goal_checker: "general_goal_checker"

    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    odom_topic: "/rtabmap/odom"  # Topic to get instantaneous measurement of speed from
    publish_zero_velocity: True   #Whether to publish a zero velocity command on goal exit. This is useful for stopping the robot when a goal terminates.

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1 #Minimum amount a robot must move to be progressing to goal (m).
      movement_time_allowance: 30.0 #Maximum amount of time a robot has to move the minimum radius (s).

    general_goal_checker:
      stateful: True # Whether to check for XY position tolerance after rotating to goal orientation in case of minor localization changes.
      plugin: "nav2_controller::SimpleGoalChecker"
      # Strict defaults for localization. navigation_launch.py overrides these per-launch
      # (looser during exploration mapping) via RewrittenYaml param_rewrites.
      xy_goal_tolerance: 0.25 #Tolerance to meet goal completion criteria (m).
      yaw_goal_tolerance: 0.35 #Tolerance to meet goal completion criteria (rad).

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15 #The desired maximum linear velocity (m/s) to use.
      lookahead_dist: 0.6 #The lookahead distance (m) to use to find the lookahead point when use_velocity_scaled_lookahead_dist is false.
      min_lookahead_dist: 0.3 #The minimum lookahead distance (m) threshold when use_velocity_scaled_lookahead_dist is true.
      max_lookahead_dist: 0.9 #The maximum lookahead distance (m) threshold when use_velocity_scaled_lookahead_dist is true.
      lookahead_time: 1.5  #The time (s) to project the velocity by when use_velocity_scaled_lookahead_dist is true. Also known as the lookahead gain.
      rotate_to_heading_angular_vel: 0.3 #If use_rotate_to_heading is true, this is the angular velocity to use.
      transform_tolerance: 0.1 #The TF transform tolerance (s).
      use_velocity_scaled_lookahead_dist: false # Whether to use the velocity scaled lookahead distances or constant lookahead_distance.
      min_approach_linear_velocity: 0.05 #The minimum velocity (m/s) threshold to apply when approaching the goal to ensure progress. Must be > 0.01.
      approach_velocity_scaling_dist: 0.6 #The distance (m) left on the path at which to start slowing down. Should be less than the half the costmap width.
      use_collision_detection: true #Whether to enable collision detection.
      max_allowed_time_to_collision_up_to_carrot: 1.0 #The time (s) to project a velocity command forward to check for collisions when use_collision_detection is true.
                                                      #Pre-Humble, this was max_allowed_time_to_collision.
      use_regulated_linear_velocity_scaling: true  #Whether to use the regulated features for path curvature (e.g. slow on high curvature paths).
      use_fixed_curvature_lookahead: false #Whether to use a fixed lookahead distance to compute curvature from. Since a lookahead distance may be set to vary on velocity, it can introduce a reference cycle that can be problematic for large lookahead distances
      curvature_lookahead_dist: 0.25 #Distance to look ahead on the path to detect curvature.
      use_cost_regulated_linear_velocity_scaling: true #Whether to use the regulated features for proximity to obstacles (e.g. slow in close proximity to obstacles).

      regulated_linear_scaling_min_radius: 0.9 #The turning radius (m) for which the regulation features are triggered when use_regulated_linear_velocity_scaling is true. Remember, sharper turns have smaller radii.
      regulated_linear_scaling_min_speed: 0.25 #The minimum speed (m/s) for which any of the regulated heuristics can send, to ensure process is still achievable even in high cost spaces with high curvature. Must be > 0.1.
      use_rotate_to_heading: true #Whether to enable rotating to rough heading and goal orientation when using holonomic planners. Recommended on for all robot types that can rotate in place.
                                  #Note: both use_rotate_to_heading and allow_reversing cannot be set to true at the same time as it would result in ambiguous situations.
      allow_reversing: false #Enables the robot to drive in the reverse direction, when the path planned involves reversing (which is represented by orientation cusps). Variants of the smac_planner comes with the support of reversing. Checkout the Smac Planner to know more.
      rotate_to_heading_min_angle: 0.785 #The difference in the path orientation and the starting robot orientation (radians) to trigger a rotate in place, if use_rotate_to_heading is true.
      max_angular_vel: 0.1 #Maximum allowable angular velocity (rad/s) while rotating to heading, if use_rotate_to_heading is true.
      max_angular_accel: 0.2 #Maximum allowable angular acceleration (rad/s/s) while rotating to heading, if use_rotate_to_heading is true.
      max_robot_pose_search_dist: 10.0 #Upper bound on integrated distance along the global plan to search for the closest pose to the robot pose.
                                      #This should be left as the default unless there are paths with loops and intersections that do not leave the local costmap,
                                      #in which case making this value smaller is necessary to prevent shortcutting.
                                      #If set to -1, it will use the maximum distance possible to search every point on the path for the nearest path point.
      stateful: True #Enables stateful goal handling behavior. When set to true, the controller will persist the goal state once the robot reaches the XY tolerance. It will then focus on aligning to the goal heading without reverting to XY position corrections.
      min_distance_to_obstacle: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: True
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.6
      footprint_padding: 0.0
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.5 # determines how quickly cost decrease as you move away from an obstacle. A bigger value means the cost decreases very quickly
        inflation_radius: 0.6
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        # Disabled: avoid clearing obstacles that fall under the arm-extended footprint.
        # (RPP's use_collision_detection already checks against the live footprint polygon.)
        footprint_clearing_enabled: false
        scan:
          topic: /front/scan
          data_type: "LaserScan"
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          raytrace_max_range: 20.0
          raytrace_min_range: 0.0
          inf_is_valid: False     
          expected_update_rate: 0.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.6
      use_sim_time: True
      footprint: "[ [-0.27, 0.34], [0.61, 0.34], [0.61, -0.34], [-0.27, -0.34] ]"
      footprint_padding: 0.0
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: combined_cloud
        combined_cloud:
          topic: /combined_cloud
          max_obstacle_height: 2.0
          min_obstacle_height: 0.15
          clearing: True
          marking: False
          data_type: "PointCloud2"
          raytrace_max_range: 30.0
          raytrace_min_range: 0.0
          obstacle_max_range: 30.0
          obstacle_min_range: 0.0
      static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_topic: /map
          map_subscribe_transient_local: True
          first_map_only: False       # ← important: prevents waiting for updates
          subscribe_to_updates: False
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.5 # determines how quickly cost decrease as you move away from an obstacle. A bigger value means the cost decreases very quickly
        inflation_radius: 0.6
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["retract_arm_from_obstacle", "back_out_from_obstacle", "spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    # Least-disruptive escape (tried first): retract the UR10e arm until the
    # footprint clears - fold reach toward the compact home shape and bias the
    # shoulder pan away from the obstacle by a capped amount.
    retract_arm_from_obstacle:
      plugin: "robo_drill::RetractArmFromObstacle"
      costmap_frame: "odom"
      search_radius: 2.0
      obstacle_cost_min: 128
      clear_cost_threshold: 50.0
      # Route the retraction through the arm planner (not the controller directly),
      # so motion is collision-aware and at the planner's max_velocity_scaling.
      # Driven by the launch's planner_backend arg (RewrittenYaml allow_substs):
      # "moveit" (joint goal) retracts the arm; "legacy" hands off to base recovery.
      planner_backend: "$(var planner_backend)"
      # Phase 1: reorient the arm by spinning the shoulder pan toward the clear
      # side (keeps reach) before folding. Fold is the fallback if the spin
      # can't clear it.
      prefer_pan_spin: true
      fold_fallback: true
      joint_goal_topic: "/arm/joint_goal"
      cancel_service: "/emergency_stop"
      execution_status_topic: "/execution_status"
      goal_failed_topic: "/planner/goal_failed"
      joint_states_topic: "/joint_states"
      # pan, lift, elbow, wrist_1, wrist_2, wrist_3
      arm_joints: ["arm_shoulder_pan_joint", "arm_shoulder_lift_joint", "arm_elbow_joint", "arm_wrist_1_joint", "arm_wrist_2_joint", "arm_wrist_3_joint"]
      arm_mount_yaw: -2.3562
      # Compact "home" shape to fold reach toward (from arm_control initial_positions).
      # The goal cancels the instant the footprint clears (minimal retraction).
      home_lift: -1.2
      home_elbow: -2.3
      # Pan-spin direction: the current arm-tip azimuth is read from the actual
      # arm_tool0 TF (not an analytic formula). pan_joint_sign maps a +pan command
      # to +/- world azimuth; if the first spin makes the footprint worse or the
      # planner refuses it, the behavior reverses direction once, then folds.
      tip_frame: "arm_tool0"
      pan_joint_sign: 1.0
      # Pan-spin also retracts the arm: raise the shoulder lift toward vertical
      # (upper arm up, +z of map) while the forearm (elbow) counter-rotates so the
      # arm folds inward instead of swinging its reach out. The motion is bounded
      # and cancels the instant the footprint clears.
      #  - pan_spin_lift_vertical: lift value at vertical (UR10e: -pi/2).
      #  - pan_spin_lift_step:     max raise per goal (rad).
      #  - max_lift_raise:         max TOTAL raise above the arm's resting lift, so
      #                            it doesn't keep creeping up on every obstacle.
      #  - elbow_lift_coupling:    forearm counter-rotation per unit lift raise.
      pan_spin_lift_vertical: -1.5708
      pan_spin_lift_step: 0.7854
      max_lift_raise: 0.8
      elbow_lift_coupling: 1.0
    # Second escape (after the arm retract): strafe the holonomic base away from
    # the obstacle. With the MoveIt backend it picks the clear side from the
    # robot-body-filtered pointcloud (cloud_topic); otherwise it falls back to a
    # cost-weighted repulsive vector over the local costmap.
    back_out_from_obstacle:
      plugin: "robo_drill::BackOutFromObstacle"
      costmap_frame: "odom"
      search_radius: 2.0
      obstacle_cost_min: 128
      clear_cost_threshold: 50.0
      forward_check_dist: 0.15
      # Driven by the launch's planner_backend arg (RewrittenYaml allow_substs).
      # "moveit": use the filtered pointcloud to choose the escape side.
      planner_backend: "$(var planner_backend)"
      cloud_topic: "/combined_cloud_filtered"
      # Only cloud points in this height band (costmap_frame z, ~floor=0) count
      # as obstacles to push away from - skips the floor and overhead structure.
      cloud_min_z: 0.1
      cloud_max_z: 2.0
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: map
    local_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.15, 0.0, 0.25]
    min_velocity: [-0.15, 0.0, -0.25]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [0.2, 0.0, 2.2]
    max_decel: [-0.2, 0.0, -2.2]
    odom_topic: "/rtabmap/odom"
    odom_duration: 0.1
    use_realtime_priority: false
    enable_stamped_cmd_vel: false
