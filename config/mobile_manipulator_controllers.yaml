# Observe that to enable the namespace usage, 
# the symbol /** has been added to all controllers

/**/controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Core controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # UR10e arm controllers
    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController

    force_mode_controller:
      type: ur_controllers/ForceModeController

    freedrive_mode_controller:
      type: ur_controllers/FreedriveModeController

    passthrough_trajectory_controller:
      type: ur_controllers/PassthroughTrajectoryController

    tcp_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster

    ur_configuration_controller:
      type: ur_controllers/URConfigurationController

    # Mobile base controllers  
    diffbot_base_controller:
      type: diff_drive_controller/DiffDriveController
    
    turret_controller:
      type: velocity_controllers/JointGroupVelocityController

    gantry_position_controller:
      type: forward_command_controller/ForwardCommandController

    base_actuators_controller:
      type: gpio_controllers/GpioCommandController

    sim_controller:
      type: sim_controller/SimController

# /**/joint_state_broadcaster:
#   ros__parameters:
#     frame_id: arm_base_link

/**/speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0
    tf_prefix: "arm_"

/**/io_and_status_controller:
  ros__parameters:
    tf_prefix: "arm_"

/**/ur_configuration_controller:
  ros__parameters:
    tf_prefix: "arm_"

/**/force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: arm_tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: arm_tool0
    topic_name: ft_data

/**/joint_trajectory_controller:
  ros__parameters:
    joints:
      - arm_shoulder_pan_joint
      - arm_shoulder_lift_joint
      - arm_elbow_joint
      - arm_wrist_1_joint
      - arm_wrist_2_joint
      - arm_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      arm_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      arm_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      arm_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

/**/scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - arm_shoulder_pan_joint
      - arm_shoulder_lift_joint
      - arm_elbow_joint
      - arm_wrist_1_joint
      - arm_wrist_2_joint
      - arm_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      arm_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      arm_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      arm_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      arm_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }
    speed_scaling_interface_name: arm_speed_scaling/speed_scaling_factor

/**/passthrough_trajectory_controller:
  ros__parameters:
    tf_prefix: "arm_"
    joints:
      - arm_shoulder_pan_joint
      - arm_shoulder_lift_joint
      - arm_elbow_joint
      - arm_wrist_1_joint
      - arm_wrist_2_joint
      - arm_wrist_3_joint
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: arm_speed_scaling/speed_scaling_factor

/**/forward_velocity_controller:
  ros__parameters:
    joints:
      - arm_shoulder_pan_joint
      - arm_shoulder_lift_joint
      - arm_elbow_joint
      - arm_wrist_1_joint
      - arm_wrist_2_joint
      - arm_wrist_3_joint
    interface_name: velocity

/**/forward_position_controller:
  ros__parameters:
    joints:
      - arm_shoulder_pan_joint
      - arm_shoulder_lift_joint
      - arm_elbow_joint
      - arm_wrist_1_joint
      - arm_wrist_2_joint
      - arm_wrist_3_joint

/**/force_mode_controller:
  ros__parameters:
    tf_prefix: "arm_"

/**/freedrive_mode_controller:
  ros__parameters:
    tf_prefix: "arm_"

/**/tcp_pose_broadcaster:
  ros__parameters:
    frame_id: arm_base
    pose_name: arm_tcp_pose
    tf:
      child_frame_id: arm_tool0_controller

# Mobile base differential drive
/**/diffbot_base_controller:
  ros__parameters:
    left_wheel_names: ["drivewhl_l_joint"]
    right_wheel_names: ["drivewhl_r_joint"]
    
    wheel_separation: 0.3655
    wheel_radius: 0.125
    
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0
    
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    
    open_loop: false
    position_feedback: false
    enable_odom_tf: false  # Will be overridden by launch argument
    
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    
    # Velocity limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 0.8
    
    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    angular.z.max_acceleration: 1.0
    angular.z.min_acceleration: -1.0

# Turret controller
/**/turret_controller:
  ros__parameters:
    joints: ['turret_joint']

# Gantry controller
/**/gantry_position_controller:
  ros__parameters:
    joints:
      - stage1_lift_joint
      - stage2_lift_joint
      - stage3_rotate_joint
      - stage4_horizontal_joint
    interface_name: position

# Base-mounted actuators: hydraulic valve and caster brake motor.
# On/off gpio outputs, not joints. Command with 1.0 / 0.0 on
# /base_actuators_controller/commands (control_msgs/DynamicInterfaceGroupValues);
# state is echoed on /base_actuators_controller/gpio_states.
/**/base_actuators_controller:
  ros__parameters:
    gpios:
      - hydraulic_valve
      - caster_brake
    command_interfaces:
      hydraulic_valve:
        interfaces:
          - open
      caster_brake:
        interfaces:
          - engaged
    state_interfaces:
      hydraulic_valve:
        interfaces:
          - open
      caster_brake:
        interfaces:
          - engaged

sim_controller:
  ros__parameters:
    interface_name: 'velocity'
    joints: ['drivewhl_l_joint', 'drivewhl_r_joint','turret_joint']
    cmd_topic_name: '/diffbot_base_controller/cmd_vel_unstamped'
    odometry_topic_name: '/odom'
    update_mode: 'readings'
    cmd_type: 'relative'
    enable_pull_compensation: true
    pull_compensation_min_speed: 0.05
    cmd_vel_timeout: 0.5
    enable_park_service: true  # exposes ~/park_now so the UI can park before shutdown
    wheel_separation: 0.8
    center_distance: 0.4
    wheel_radius: 0.125
    # Linear velocity limits [m/s]
    max_x_velocity: 0.2
    min_x_velocity: -0.2
    max_y_velocity: 0.2
    min_y_velocity: -0.2
    max_z_velocity: 0.0
    min_z_velocity: 0.0
    # Angular velocity limits [rad/s]
    max_angular_turret: 0.35  # thetap_dot
    min_angular_turret: -0.35
    max_angular_base: 0.2     # thetac_dot
    min_angular_base: -0.2
    # Acceleration limits (0 = unconstrained)
    max_x_acceleration: 0.2
    min_x_acceleration: -0.2
    max_y_acceleration: 0.2
    min_y_acceleration: -0.2
    max_z_acceleration: 0.2
    min_z_acceleration: -0.2
    max_alpha_base: 0.2
    min_alpha_base: -0.2
    max_alpha_turret: 0.2
    min_alpha_turret: -0.2
    # Wheel speed limits [rad/s]
    max_left_wheel_motor_speed: 3.5   # 	ωL
    min_left_wheel_motor_speed: -3.5 
    max_right_wheel_motor_speed: 3.5  # 	ωR
    min_right_wheel_motor_speed: -3.5
    max_turret_motor_speed: 0.5       # 	ωT = (dφ/dt)
    min_turret_motor_speed: -0.5
    should_publish_tf: false
    should_publish_odom: false
